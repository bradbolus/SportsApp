<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0e2a4a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Matchday">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>MATCHDAY — Sports Broadcast Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04060f;
    --surface: #080d1a;
    --surface2: #0d1528;
    --surface3: #111e36;
    --border: #1a2d4d;
    --border-soft: #0f1f38;
    --accent: #48b4e8;
    --accent-dim: #2a7aad;
    --accent-glow: #48b4e820;
    --highlight: #7dd4f8;
    --text: #ffffff;
    --text-soft: #c8dff0;
    --muted: #7a9ab8;
    --live: #e84848;
    --live-glow: #e8484820;
    --soon: #e8a848;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 70% 60% at 15% -5%, #0a2a5018, transparent 55%), radial-gradient(ellipse 50% 40% at 85% 105%, #0a1e3a22, transparent 55%); pointer-events: none; z-index: 0; }

  /* ─── HEADER ──────────────────────────────────────────────── */
  header {
    position: sticky; top: 0; z-index: 50;
    padding: 14px 32px 12px;
    display: flex; align-items: center; justify-content: space-between;
    background: #0e2a4a;
    border-bottom: 2px solid #1a4a7a;
    box-shadow: 0 4px 24px #000000a0;
  }
  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.1em; color: #ffffff; display: flex; align-items: baseline; gap: 4px; line-height: 1; }
  .logo span { color: #7dd4f8; }
  .logo-sub { font-family: 'Space Mono', monospace; font-size: 0.48rem; color: #7aadcc; letter-spacing: 0.25em; text-transform: uppercase; margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .live-badge { display: flex; align-items: center; gap: 7px; background: #1a0808; border: 1px solid var(--live); color: var(--live); font-family: 'Space Mono', monospace; font-size: 0.58rem; font-weight: 700; letter-spacing: 0.12em; padding: 5px 11px; border-radius: 3px; box-shadow: 0 0 12px var(--live-glow); }
  .live-dot { width: 5px; height: 5px; background: var(--live); border-radius: 50%; box-shadow: 0 0 6px var(--live); animation: livePulse 1.4s ease-in-out infinite; }
  @keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.6)} }
  .time-display { font-family: 'Space Mono', monospace; font-size: 0.65rem; color: #a0c8e0; letter-spacing: 0.08em; }

  /* ─── LOADING BAR ─────────────────────────────────────────── */
  .loading-bar { position: relative; z-index: 10; height: 2px; background: linear-gradient(90deg, transparent, var(--accent), transparent); background-size: 200% 100%; animation: loadSlide 1.2s linear infinite; display: none; }
  .loading-bar.active { display: block; }
  @keyframes loadSlide { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

  /* ─── STATS BAR ───────────────────────────────────────────── */
  .stats-bar { position: relative; z-index: 10; display: flex; border-bottom: 1px solid var(--border); overflow-x: auto; background: var(--surface); }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat-item { padding: 10px 22px; border-right: 1px solid var(--border-soft); min-width: 100px; flex-shrink: 0; }
  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1; color: #ffffff; }
  .stat-num.accent { color: var(--accent); }
  .stat-num.live-color { color: var(--live); text-shadow: 0 0 16px var(--live-glow); }
  .stat-label { font-family: 'Space Mono', monospace; font-size: 0.48rem; letter-spacing: 0.18em; color: var(--muted); text-transform: uppercase; margin-top: 2px; }

  /* ─── SEARCH ──────────────────────────────────────────────── */
  .search-wrap { position: relative; z-index: 10; padding: 12px 32px; border-bottom: 1px solid var(--border); background: var(--surface); }
  .search-inner { position: relative; max-width: 500px; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  #search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: #ffffff; font-family: 'DM Sans', sans-serif; font-size: 0.85rem; padding: 8px 36px 8px 34px; border-radius: 3px; transition: all 0.15s; outline: none; }
  #search-input::placeholder { color: var(--muted); }
  #search-input:focus { border-color: var(--accent-dim); background: var(--surface3); box-shadow: 0 0 0 3px var(--accent-glow); }
  .search-clear { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.75rem; padding: 4px; display: none; }
  .search-clear.visible { display: block; }
  .search-count { font-family: 'Space Mono', monospace; font-size: 0.55rem; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-top: 6px; min-height: 14px; }

  /* ─── HERO STRIP ──────────────────────────────────────────── */
  .hero-strip { position: relative; z-index: 10; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, #0a0814, var(--bg)); display: none; }
  .hero-inner { padding: 14px 32px 16px; }
  .hero-label { font-family: 'Space Mono', monospace; font-size: 0.55rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--live); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .hero-label::before { content:''; display:inline-block; width:6px; height:6px; background:var(--live); border-radius:50%; box-shadow:0 0 8px var(--live); animation:livePulse 1.4s ease-in-out infinite; }
  .hero-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
  .hero-scroll::-webkit-scrollbar { display: none; }
  .hero-card { flex-shrink:0; width:240px; scroll-snap-align:start; background:linear-gradient(135deg,#120816,#0a0f1e); border:1px solid var(--live); border-radius:5px; padding:14px 16px; cursor:pointer; transition:all 0.2s ease; position:relative; overflow:hidden; box-shadow:0 0 20px var(--live-glow); }
  .hero-card.soon { border-color:var(--soon); box-shadow:0 0 16px #e8a84820; }
  .hero-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--sport-color,var(--live)); }
  .hero-card:hover { transform:translateY(-2px); }
  .hero-status { font-family:'Space Mono',monospace; font-size:0.55rem; font-weight:700; letter-spacing:0.15em; color:var(--live); margin-bottom:6px; }
  .hero-card.soon .hero-status { color:var(--soon); }
  .hero-title { font-weight:600; font-size:0.88rem; line-height:1.3; color:#ffffff; margin-bottom:4px; }
  .hero-meta { font-family:'Space Mono',monospace; font-size:0.55rem; color:var(--muted); letter-spacing:0.08em; }
  .hero-bottom { display:flex; justify-content:space-between; align-items:center; margin-top:10px; padding-top:10px; border-top:1px solid #ffffff12; }
  .hero-time { font-family:'Bebas Neue',sans-serif; font-size:1.15rem; color:var(--highlight); }
  .hero-bell { background:var(--surface3); border:1px solid var(--border); color:var(--muted); padding:4px 8px; border-radius:3px; font-size:0.75rem; cursor:pointer; transition:all 0.15s; }
  .hero-bell:hover { border-color:var(--accent-dim); color:var(--accent); }
  .hero-bell.set { background:var(--accent-glow); border-color:var(--accent); color:var(--accent); }

  /* ─── FILTERS ─────────────────────────────────────────────── */
  .filters-wrap { position:relative; z-index:10; padding:14px 32px; border-bottom:1px solid var(--border); display:flex; gap:20px; align-items:flex-end; flex-wrap:wrap; background:linear-gradient(180deg,var(--surface),transparent); }
  .filter-group { display:flex; flex-direction:column; gap:6px; }
  .filter-label { font-family:'Space Mono',monospace; font-size:0.52rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--muted); }
  .filter-pills { display:flex; gap:5px; flex-wrap:wrap; }
  .pill { padding:5px 12px; border-radius:2px; border:1px solid var(--border); background:transparent; color:#c0d8f0; font-family:'DM Sans',sans-serif; font-size:0.76rem; font-weight:500; cursor:pointer; transition:all 0.15s; white-space:nowrap; }
  .pill:hover { border-color:var(--accent-dim); color:#ffffff; background:var(--accent-glow); }
  .pill.active { background:var(--accent); border-color:var(--accent); color:#04060f; font-weight:600; box-shadow:0 0 14px var(--accent-glow); }
  .pill.sport-active { background:var(--surface3); border-color:var(--accent); color:#ffffff; }
  .country-tag { display:flex; align-items:center; gap:8px; background:var(--surface2); border:1px solid var(--border); padding:5px 14px; border-radius:2px; font-family:'DM Sans',sans-serif; font-size:0.76rem; color:#ffffff; }

  /* ─── API BANNER ──────────────────────────────────────────── */
  .api-banner { position:relative; z-index:10; margin:12px 32px 0; padding:9px 13px; border:1px solid var(--border-soft); border-left:3px solid var(--accent-dim); border-radius:2px; font-size:0.7rem; color:var(--muted); }
  .api-banner strong { color:#ffffff; }
  .api-banner.warn { border-left-color:var(--soon); }
  .api-banner.warn strong { color:var(--soon); }

  /* ─── NOTIF BANNER ────────────────────────────────────────── */
  .notif-banner { position:relative; z-index:10; margin:8px 32px 0; padding:10px 14px; background:#0a1428; border:1px solid var(--accent-dim); border-radius:3px; display:none; align-items:center; justify-content:space-between; gap:12px; font-size:0.76rem; color:#ffffff; }
  .notif-banner.show { display:flex; }
  .notif-banner span { color:var(--accent); font-weight:600; }
  .notif-allow { background:var(--accent); border:none; color:#04060f; font-family:'Space Mono',monospace; font-size:0.58rem; font-weight:700; letter-spacing:0.1em; padding:5px 12px; border-radius:2px; cursor:pointer; }
  .notif-dismiss { background:none; border:1px solid var(--border); color:var(--muted); font-family:'Space Mono',monospace; font-size:0.58rem; padding:5px 10px; border-radius:2px; cursor:pointer; }

  /* ─── CARDS ───────────────────────────────────────────────── */
  main { position:relative; z-index:10; padding:24px 32px; display:flex; flex-direction:column; gap:24px; }
  .day-section h2 { font-family:'Bebas Neue',sans-serif; font-size:0.95rem; letter-spacing:0.2em; color:var(--muted); text-transform:uppercase; margin-bottom:12px; display:flex; align-items:center; gap:12px; }
  .day-section h2::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,var(--border),transparent); }
  .day-section h2.today { color:var(--accent); }
  .events-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:10px; }

  .event-card { background:linear-gradient(135deg,var(--surface),var(--surface2)); border:1px solid var(--border-soft); border-radius:4px; padding:15px 17px; cursor:pointer; transition:all 0.2s ease; position:relative; overflow:hidden; animation:cardIn 0.35s ease both; }
  .event-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--sport-color,var(--muted)); opacity:0.85; }
  @keyframes cardIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  .event-card:hover { border-color:var(--border); transform:translateY(-2px); background:linear-gradient(135deg,var(--surface2),var(--surface3)); box-shadow:0 10px 30px -10px #000000c0; }
  .event-card.is-live { border-color:#2a1a1a; box-shadow:0 0 0 1px #e8484815,inset 0 0 30px #e8484806; }

  .card-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:9px; }
  .sport-tag { font-family:'Space Mono',monospace; font-size:0.56rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--sport-color,var(--muted)); display:flex; align-items:center; gap:5px; }
  .status-badge { font-family:'Space Mono',monospace; font-size:0.56rem; letter-spacing:0.1em; padding:3px 7px; border-radius:2px; font-weight:700; flex-shrink:0; }
  .status-live { background:var(--live-glow); border:1px solid var(--live); color:var(--live); animation:badgePulse 1.6s ease-in-out infinite; }
  .status-soon { background:#1a1200; border:1px solid var(--soon); color:var(--soon); }
  .status-upcoming { background:transparent; border:1px solid var(--border); color:#8ab0cc; }
  @keyframes badgePulse { 0%,100%{box-shadow:0 0 6px var(--live-glow)} 50%{box-shadow:0 0 14px var(--live-glow)} }

  .event-title { font-weight:600; font-size:0.92rem; line-height:1.35; margin-bottom:4px; color:#ffffff; }
  .event-meta { font-size:0.72rem; color:#8ab0cc; margin-bottom:10px; }
  .card-bottom { display:flex; justify-content:space-between; align-items:center; padding-top:9px; border-top:1px solid var(--border-soft); }
  .broadcaster-list { display:flex; gap:4px; flex-wrap:wrap; }
  .broadcaster-chip { font-family:'Space Mono',monospace; font-size:0.52rem; padding:2px 7px; border-radius:2px; background:#0a1e38; border:1px solid #1a3a5a; color:#7dd4f8; letter-spacing:0.04em; font-weight:600; }
  .card-actions { display:flex; align-items:center; gap:6px; }
  .event-time { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; color:#ffffff; white-space:nowrap; }
  .event-time small { font-family:'Space Mono',monospace; font-size:0.48rem; color:var(--muted); display:block; text-align:right; letter-spacing:0.12em; }
  .bell-btn { background:transparent; border:1px solid var(--border); color:var(--muted); padding:3px 7px; border-radius:2px; font-size:0.75rem; cursor:pointer; transition:all 0.15s; }
  .bell-btn:hover { border-color:var(--accent-dim); color:var(--accent); }
  .bell-btn.set { background:var(--accent-glow); border-color:var(--accent); color:var(--accent); }

  /* ─── EMPTY / ERROR ───────────────────────────────────────── */
  .empty-state { text-align:center; padding:70px 32px; color:var(--muted); }
  .empty-state .icon { font-size:2.2rem; margin-bottom:12px; opacity:0.3; }
  .empty-state p { font-size:0.82rem; line-height:1.8; color:#8ab0cc; }
  .retry-btn { margin-top:16px; background:var(--surface2); border:1px solid var(--border); color:var(--accent); font-family:'Space Mono',monospace; font-size:0.65rem; letter-spacing:0.1em; padding:8px 16px; border-radius:3px; cursor:pointer; }
  .retry-btn:hover { background:var(--accent-glow); }

  /* ─── TOAST ───────────────────────────────────────────────── */
  .toast { position:fixed; bottom:calc(24px + var(--safe-bottom)); left:50%; transform:translateX(-50%) translateY(80px); background:var(--surface3); border:1px solid var(--border); border-left:3px solid var(--accent); color:#ffffff; font-family:'DM Sans',sans-serif; font-size:0.82rem; padding:11px 18px; border-radius:4px; z-index:200; box-shadow:0 10px 40px -10px #000000c0; white-space:nowrap; transition:transform 0.3s ease,opacity 0.3s ease; opacity:0; pointer-events:none; }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

  /* ─── MODAL ───────────────────────────────────────────────── */
  .modal-overlay { position:fixed; inset:0; background:#04060fcc; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); z-index:100; display:none; align-items:center; justify-content:center; padding:24px; }
  .modal-overlay.open { display:flex; }
  .modal { background:linear-gradient(145deg,#0d1a30,#080e1c); border:1px solid var(--border); border-radius:6px; padding:24px; max-width:460px; width:100%; position:relative; animation:modalIn 0.2s ease; box-shadow:0 30px 80px -20px #000000c0; max-height:90vh; overflow-y:auto; }
  .modal::-webkit-scrollbar { display:none; }
  @keyframes modalIn { from{opacity:0;transform:scale(0.96) translateY(8px)} to{opacity:1;transform:none} }
  .modal-close { position:absolute; top:14px; right:14px; background:var(--surface3); border:1px solid var(--border); color:#8ab0cc; font-family:'Space Mono',monospace; font-size:0.58rem; cursor:pointer; padding:4px 8px; border-radius:2px; transition:all 0.15s; letter-spacing:0.1em; }
  .modal-close:hover { color:#ffffff; border-color:var(--accent-dim); }
  .modal-sport { font-family:'Space Mono',monospace; font-size:0.58rem; letter-spacing:0.2em; color:var(--accent); margin-bottom:8px; }
  .modal-title { font-family:'Bebas Neue',sans-serif; font-size:1.6rem; letter-spacing:0.05em; margin-bottom:4px; line-height:1.1; color:#ffffff; }
  .modal-sub { color:#8ab0cc; font-size:0.78rem; margin-bottom:16px; }
  .modal-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:14px; }
  .modal-cell { background:var(--surface3); border:1px solid var(--border-soft); padding:9px 11px; border-radius:3px; }
  .modal-cell-label { font-family:'Space Mono',monospace; font-size:0.48rem; letter-spacing:0.18em; color:var(--muted); text-transform:uppercase; margin-bottom:3px; }
  .modal-cell-value { font-weight:600; font-size:0.82rem; color:#ffffff; }
  .modal-section { font-family:'Space Mono',monospace; font-size:0.52rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; }
  .modal-bc-list { display:flex; gap:7px; flex-wrap:wrap; margin-bottom:14px; }
  .modal-bc-chip { padding:7px 13px; background:#0a1e38; border:1px solid #1a3a5a; border-radius:3px; font-size:0.76rem; font-weight:600; color:#7dd4f8; }
  .modal-reminder { border-top:1px solid var(--border-soft); padding-top:14px; }
  .reminder-options { display:flex; gap:6px; flex-wrap:wrap; margin-top:8px; }
  .reminder-btn { padding:6px 12px; border-radius:2px; border:1px solid var(--border); background:transparent; color:#c0d8f0; font-family:'DM Sans',sans-serif; font-size:0.76rem; cursor:pointer; transition:all 0.15s; }
  .reminder-btn:hover { border-color:var(--accent-dim); color:#ffffff; background:var(--accent-glow); }
  .reminder-btn.active { background:var(--accent); border-color:var(--accent); color:#04060f; font-weight:600; }

  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--surface3); border-radius:2px; }

  @media (max-width:640px) {
    header { padding:12px 16px 10px; }
    .search-wrap,.filters-wrap,main { padding-left:16px; padding-right:16px; }
    .hero-inner { padding:12px 16px 14px; }
    .api-banner,.notif-banner { margin-left:16px; margin-right:16px; }
    .logo { font-size:1.6rem; }
    .events-grid { grid-template-columns:1fr; }
    .time-display { display:none; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">MATCH<span>DAY</span></div>
    <div class="logo-sub">Sports Broadcast Tracker · South Africa</div>
  </div>
  <div class="header-right">
    <div class="live-badge"><div class="live-dot"></div>LIVE NOW</div>
    <div class="time-display" id="clock"></div>
  </div>
</header>

<div class="loading-bar" id="loading-bar"></div>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-num live-color" id="stat-live">—</div><div class="stat-label">Live Now</div></div>
  <div class="stat-item"><div class="stat-num accent" id="stat-today">—</div><div class="stat-label">Today</div></div>
  <div class="stat-item"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Loaded</div></div>
  <div class="stat-item"><div class="stat-num" id="stat-sports">—</div><div class="stat-label">Sports</div></div>
  <div class="stat-item"><div class="stat-num" style="color:var(--highlight);font-size:1.3rem">🇿🇦</div><div class="stat-label">South Africa</div></div>
</div>

<div class="notif-banner" id="notif-banner">
  <div>🔔 Enable <span>match reminders</span> to get notified before kickoff</div>
  <div style="display:flex;gap:8px;flex-shrink:0">
    <button class="notif-allow" onclick="requestNotifPermission()">ENABLE</button>
    <button class="notif-dismiss" onclick="document.getElementById('notif-banner').classList.remove('show')">LATER</button>
  </div>
</div>

<div class="search-wrap">
  <div class="search-inner">
    <span class="search-icon">⌕</span>
    <input type="text" id="search-input" placeholder="Search teams, leagues, sports, broadcasters…" autocomplete="off" spellcheck="false">
    <button class="search-clear" id="search-clear" onclick="clearSearch()">✕</button>
  </div>
  <div class="search-count" id="search-count"></div>
</div>

<div class="hero-strip" id="hero-strip">
  <div class="hero-inner">
    <div class="hero-label">On Right Now &amp; Starting Soon</div>
    <div class="hero-scroll" id="hero-scroll"></div>
  </div>
</div>

<div class="filters-wrap">
  <div class="filter-group">
    <div class="filter-label">Day</div>
    <div class="filter-pills" id="day-filters"></div>
  </div>
  <div class="filter-group">
    <div class="filter-label">Sport</div>
    <div class="filter-pills" id="sport-filters"></div>
  </div>
  <div class="filter-group">
    <div class="filter-label">Region</div>
    <div class="country-tag">🇿🇦 South Africa</div>
  </div>
</div>

<div class="api-banner" id="api-banner">⚡ Loading live data from <strong>TheSportsDB</strong>…</div>

<main id="main"></main>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModalOverlay(event)">
  <div class="modal" id="modal-body"></div>
</div>

<script>
const SPORT_COLORS = { Football:'#5b9bd5',Soccer:'#48b4e8',Basketball:'#e89a48',Tennis:'#78d4a8',F1:'#e84848',Baseball:'#d4c048',Rugby:'#a878e8',Golf:'#68d480',Cricket:'#e8a848' };
const SPORT_ICONS  = { Football:'🏈',Soccer:'⚽',Basketball:'🏀',Tennis:'🎾',F1:'🏎️',Baseball:'⚾',Rugby:'🏉',Golf:'⛳',Cricket:'🏏' };
const DAYS = ['Today','Tomorrow','In 2 Days'];

let selectedDay    = 'Today';
let selectedSports = new Set(['All']);
let searchQuery    = '';
let reminders      = {};
let loadedDates    = {};
let allEvents      = [];

try { reminders = JSON.parse(localStorage.getItem('matchday_reminders')||'{}'); } catch(e){}

const pad = n => String(n).padStart(2,'0');

function getDateStr(offset) {
  const d = new Date(); d.setDate(d.getDate()+offset);
  return d.toISOString().split('T')[0];
}
function formatTime(iso) {
  const d = new Date(iso);
  return `${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function getStatus(ev) {
  const now=Date.now(), start=new Date(ev.time).getTime(), end=start+ev.duration*60000;
  if(now>=start&&now<=end) return 'live';
  if(start>now&&start-now<3600000) return 'soon';
  return 'upcoming';
}

// Clock
function updateClock() {
  const n=new Date();
  document.getElementById('clock').textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())} SAST`;
}
setInterval(updateClock,1000); updateClock();
setInterval(()=>{renderHero();render();},30000);

function setLoading(on){document.getElementById('loading-bar').classList.toggle('active',on);}

// Fetch
async function fetchDay(offset) {
  const dateStr=getDateStr(offset);
  if(loadedDates[dateStr]) return loadedDates[dateStr];
  try {
    const res=await fetch(`/api/events?date=${dateStr}`);
    const data=await res.json();
    loadedDates[dateStr]=data.events||[];
    updateApiBanner(data);
    return loadedDates[dateStr];
  } catch(err) { console.error(err); return []; }
}

function updateApiBanner(data) {
  const b=document.getElementById('api-banner');
  if(!data.count) {
    b.className='api-banner warn';
    b.innerHTML=`⚠️ <strong>No events found</strong> from TheSportsDB for this date. Try a different day.`;
  } else {
    b.className='api-banner';
    b.innerHTML=`✅ <strong>${data.count} events</strong> loaded live from TheSportsDB`;
  }
}

// Hero strip
function renderHero() {
  const today=loadedDates[getDateStr(0)]||[];
  const evs=today.filter(e=>getStatus(e)==='live'||getStatus(e)==='soon')
    .sort((a,b)=>{const o={live:0,soon:1};return(o[getStatus(a)]||2)-(o[getStatus(b)]||2)||new Date(a.time)-new Date(b.time);});
  const strip=document.getElementById('hero-strip');
  const scroll=document.getElementById('hero-scroll');
  if(!evs.length){strip.style.display='none';return;}
  strip.style.display='block'; scroll.innerHTML='';
  evs.forEach(ev=>{
    const status=getStatus(ev),color=SPORT_COLORS[ev.sport]||'#4a6a8a',isSet=!!reminders[ev.id];
    const card=document.createElement('div');
    card.className=`hero-card${status==='soon'?' soon':''}`;
    card.style.cssText=`--sport-color:${color}`;
    card.innerHTML=`
      <div class="hero-status">${status==='live'?'● LIVE NOW':'⚡ STARTING SOON'}</div>
      <div class="hero-title">${ev.title}</div>
      <div class="hero-meta">${ev.sport} · ${ev.league}</div>
      <div class="hero-bottom">
        <div class="hero-time">${formatTime(ev.time)}</div>
        <button class="hero-bell${isSet?' set':''}" onclick="event.stopPropagation();toggleReminder('${ev.id}')">${isSet?'🔔':'🔕'}</button>
      </div>`;
    card.onclick=()=>openModal(ev);
    scroll.appendChild(card);
  });
}

// Filters
function initFilters() {
  const dayEl=document.getElementById('day-filters');
  DAYS.forEach(day=>{
    const btn=document.createElement('button');
    btn.className='pill'+(day===selectedDay?' active':'');
    btn.textContent=day;
    btn.onclick=()=>{selectedDay=day;clearSearch();loadAndRender();};
    dayEl.appendChild(btn);
  });
  const sports=['All',...Object.keys(SPORT_COLORS)];
  const sportEl=document.getElementById('sport-filters');
  sports.forEach(sport=>{
    const btn=document.createElement('button');
    btn.className='pill'+(selectedSports.has(sport)?(sport==='All'?' active':' sport-active'):'');
    btn.textContent=sport==='All'?'All':`${SPORT_ICONS[sport]||''} ${sport}`;
    btn.onclick=()=>{
      if(sport==='All'){selectedSports=new Set(['All']);}
      else{selectedSports.delete('All');selectedSports.has(sport)?selectedSports.delete(sport):selectedSports.add(sport);if(!selectedSports.size)selectedSports.add('All');}
      render();
    };
    sportEl.appendChild(btn);
  });
}

function refreshPills() {
  document.querySelectorAll('#day-filters .pill').forEach(b=>{b.className='pill'+(b.textContent===selectedDay?' active':'');});
  const sports=['All',...Object.keys(SPORT_COLORS)];
  document.querySelectorAll('#sport-filters .pill').forEach((b,i)=>{const s=sports[i],on=selectedSports.has(s);b.className='pill'+(on?(s==='All'?' active':' sport-active'):'');});
}

// Search
document.getElementById('search-input').addEventListener('input',e=>{
  searchQuery=e.target.value.trim().toLowerCase();
  document.getElementById('search-clear').classList.toggle('visible',!!searchQuery);
  render();
});
function clearSearch(){
  document.getElementById('search-input').value='';searchQuery='';
  document.getElementById('search-clear').classList.remove('visible');
  document.getElementById('search-count').textContent='';render();
}
function matches(ev){
  if(!searchQuery)return true;
  const hay=[ev.title,ev.sport,ev.league,ev.venue,...(ev.broadcasters||[])].join(' ').toLowerCase();
  return searchQuery.split(' ').every(t=>hay.includes(t));
}
function hl(text){
  if(!searchQuery)return text;
  return searchQuery.split(' ').filter(Boolean).reduce((t,term)=>
    t.replace(new RegExp(`(${term.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),
      '<mark style="background:#1a3a5a;color:#7dd4f8;border-radius:2px;padding:0 2px">$1</mark>'),text);
}

// Load + render
async function loadAndRender(){
  setLoading(true);
  await fetchDay(DAYS.indexOf(selectedDay));
  setLoading(false);
  allEvents=Object.values(loadedDates).flat();
  renderHero(); render();
}
function getVisible(){
  if(searchQuery)return allEvents.filter(matches);
  const base=loadedDates[getDateStr(DAYS.indexOf(selectedDay))]||[];
  return selectedSports.has('All')?base:base.filter(e=>selectedSports.has(e.sport));
}
function render(){
  refreshPills();
  const evs=getVisible(),main=document.getElementById('main'),count=document.getElementById('search-count');
  if(searchQuery){count.textContent=evs.length?`${evs.length} result${evs.length===1?'':'s'} for "${searchQuery}"`:``;}
  else count.textContent='';
  if(!evs.length){
    main.innerHTML=`<div class="empty-state"><div class="icon">📺</div><p>No events found for this selection.<br>TheSportsDB may have limited data for this date.</p><button class="retry-btn" onclick="retryLoad()">↻ RETRY</button></div>`;
    updateStats();return;
  }
  main.innerHTML='';
  const section=document.createElement('div'); section.className='day-section';
  const h2=document.createElement('h2'); h2.className=(!searchQuery&&selectedDay==='Today')?'today':'';
  h2.innerHTML=`<span>${searchQuery?'Search Results':selectedDay}</span>`;
  section.appendChild(h2);
  const grid=document.createElement('div'); grid.className='events-grid';
  const order={live:0,soon:1,upcoming:2};
  [...evs].sort((a,b)=>{const sa=getStatus(a),sb=getStatus(b);return order[sa]!==order[sb]?order[sa]-order[sb]:new Date(a.time)-new Date(b.time);})
  .forEach((ev,i)=>{
    const status=getStatus(ev),color=SPORT_COLORS[ev.sport]||'#4a6a8a',isSet=!!reminders[ev.id];
    const card=document.createElement('div');
    card.className=`event-card${status==='live'?' is-live':''}`;
    card.style.cssText=`--sport-color:${color};animation-delay:${i*0.03}s`;
    card.innerHTML=`
      <div class="card-top">
        <div class="sport-tag">${SPORT_ICONS[ev.sport]||'🏆'} ${ev.sport} · ${ev.league}</div>
        <span class="status-badge status-${status}">${status==='live'?'LIVE':status==='soon'?'SOON':formatTime(ev.time)}</span>
      </div>
      <div class="event-title">${hl(ev.title)}</div>
      <div class="event-meta">${ev.venue}</div>
      <div class="card-bottom">
        <div class="broadcaster-list">${(ev.broadcasters||[]).map(b=>`<span class="broadcaster-chip">${b}</span>`).join('')}</div>
        <div class="card-actions">
          <button class="bell-btn${isSet?' set':''}" onclick="event.stopPropagation();toggleReminder('${ev.id}')">${isSet?'🔔':'🔕'}</button>
          <div class="event-time">${formatTime(ev.time)}<small>SAST</small></div>
        </div>
      </div>`;
    card.onclick=()=>openModal(ev); grid.appendChild(card);
  });
  section.appendChild(grid); main.appendChild(section); updateStats();
}
function updateStats(){
  const today=loadedDates[getDateStr(0)]||[];
  document.getElementById('stat-live').textContent=allEvents.filter(e=>getStatus(e)==='live').length||'0';
  document.getElementById('stat-today').textContent=today.length||'0';
  document.getElementById('stat-total').textContent=allEvents.length||'0';
  document.getElementById('stat-sports').textContent=new Set(allEvents.map(e=>e.sport)).size||'0';
}
function retryLoad(){delete loadedDates[getDateStr(DAYS.indexOf(selectedDay))];loadAndRender();}

// Modal
function openModal(ev){
  const status=getStatus(ev);
  const statusLabel=status==='live'?'🔴 LIVE NOW':status==='soon'?'⚡ STARTING SOON':`Starts ${formatTime(ev.time)} SAST`;
  const cur=reminders[ev.id];
  document.getElementById('modal-body').innerHTML=`
    <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">✕ CLOSE</button>
    <div class="modal-sport">${SPORT_ICONS[ev.sport]||'🏆'} ${ev.sport} · ${ev.league}</div>
    <div class="modal-title">${ev.title}</div>
    <div class="modal-sub">${ev.venue}</div>
    <div class="modal-grid">
      <div class="modal-cell"><div class="modal-cell-label">Status</div><div class="modal-cell-value">${statusLabel}</div></div>
      <div class="modal-cell"><div class="modal-cell-label">Kickoff (SAST)</div><div class="modal-cell-value">${formatTime(ev.time)}</div></div>
      <div class="modal-cell"><div class="modal-cell-label">Duration</div><div class="modal-cell-value">~${ev.duration} min</div></div>
      <div class="modal-cell"><div class="modal-cell-label">Region</div><div class="modal-cell-value">🇿🇦 South Africa</div></div>
    </div>
    <div class="modal-section">Where to Watch</div>
    <div class="modal-bc-list">${(ev.broadcasters||[]).map(b=>`<div class="modal-bc-chip">📺 ${b}</div>`).join('')}</div>
    <div class="modal-reminder">
      <div class="modal-section">🔔 Set Reminder</div>
      <div class="reminder-options">
        ${[5,10,15,30,60].map(m=>`<button class="reminder-btn${cur===m?' active':''}" onclick="setReminder('${ev.id}',${m})">${m<60?m+' min':'1 hr'} before</button>`).join('')}
        ${cur?`<button class="reminder-btn" onclick="removeReminder('${ev.id}')" style="border-color:#e8484840;color:var(--live)">✕ Remove</button>`:''}
      </div>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModalOverlay(e){if(e.target.id==='modal-overlay')document.getElementById('modal-overlay').classList.remove('open');}

// Reminders
function saveReminders(){try{localStorage.setItem('matchday_reminders',JSON.stringify(reminders));}catch(e){}}
function toggleReminder(id){if(reminders[id]){delete reminders[id];showToast('🔕 Reminder removed');saveReminders();renderHero();render();}else setReminder(id,15);}
function setReminder(id,mins){
  const doSet=()=>{reminders[id]=mins;saveReminders();scheduleNotif(id,mins);showToast(`🔔 Reminder set — ${mins<60?mins+' min':'1 hr'} before`);renderHero();render();const ev=allEvents.find(e=>String(e.id)===String(id));if(ev)setTimeout(()=>openModal(ev),80);};
  if(!('Notification'in window)){doSet();return;}
  if(Notification.permission==='granted')doSet();
  else if(Notification.permission==='default')Notification.requestPermission().then(p=>p==='granted'?doSet():showToast('Enable notifications for reminders'));
  else showToast('Notifications blocked in browser settings');
}
function removeReminder(id){delete reminders[id];saveReminders();showToast('🔕 Reminder removed');renderHero();render();const ev=allEvents.find(e=>String(e.id)===String(id));if(ev)setTimeout(()=>openModal(ev),80);}
function scheduleNotif(id,mins){
  if(Notification.permission!=='granted')return;
  const ev=allEvents.find(e=>String(e.id)===String(id));if(!ev)return;
  const delay=new Date(ev.time).getTime()-mins*60000-Date.now();
  if(delay>0)setTimeout(()=>new Notification('⚽ Matchday Reminder',{body:`${ev.title} starts in ${mins} min on ${(ev.broadcasters||[])[0]||'TV'}`,icon:'/icons/icon-192.png',tag:`matchday-${id}`}),delay);
}
function requestNotifPermission(){Notification.requestPermission().then(p=>{document.getElementById('notif-banner').classList.remove('show');showToast(p==='granted'?'🔔 Reminders enabled!':'Notifications blocked — check browser settings');});}

// Toast
let toastTimer;
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2800);}

// SW
if('serviceWorker'in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));

// Init
initFilters(); loadAndRender();
if('Notification'in window&&Notification.permission==='default')setTimeout(()=>document.getElementById('notif-banner').classList.add('show'),2500);
</script>
</body>
</html>
